<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金宝助手 Pro - 美食与运势</title>
    <style>
        :root { --primary: #ff4757; --secondary: #2f3542; --gold: #f1c40f; --google: #4285F4; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f1f2f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 380px; }
        
        /* 顶部导航切换 */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-food { background: #ffeae1; color: var(--primary); }
        .btn-zodiac { background: #fef9e7; color: #b7950b; }
        .nav-btn.active { background: var(--secondary); color: white; transform: scale(1.05); }

        /* 内容区域控制 */
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* 美食展示区 (沿用之前样式) */
        .display-box { background: #fffafa; border: 2px dashed #ffeaea; border-radius: 20px; padding: 20px; margin-bottom: 20px; min-height: 160px; display: flex; flex-direction: column; justify-content: center; }
        #foodName { font-size: 1.6rem; color: var(--primary); font-weight: 900; }
        
        /* 生肖算命区 */
        .zodiac-box { background: #fef9e7; border: 2px solid #f9e79f; border-radius: 20px; padding: 25px; text-align: left; }
        .zodiac-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; }
        
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1.1rem; font-weight: bold; box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3); }
        .map-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: var(--google); color: white !important; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button class="nav-btn btn-food active" onclick="switchTab('food', this)">🍜 找美食</button>
        <button class="nav-btn btn-zodiac" onclick="switchTab('zodiac', this)">🔮 算生肖</button>
    </div>

    <div id="food-section" class="content-section active">
        <div id="dbStatus" style="font-size:0.7rem; color:#2ecc71; margin-bottom:10px;">✅ 数据库已同步</div>
        <div class="display-box">
            <div id="foodName">准备摇一摇</div>
            <div id="foodTip">想吃什么？摇摇手机看运气</div>
        </div>
        <button class="main-btn" id="pickBtn" onclick="handleMainClick()">帮我决定！</button>
        <p style="font-size:0.6rem; color:#ccc; margin-top:10px;">支持微信感摇一摇</p>
    </div>

    <div id="zodiac-section" class="content-section">
        <div class="zodiac-box">
            <h3 style="margin:0; color:#b7950b;">生肖查询 (Zodiac)</h3>
            <p style="font-size:0.8rem; color:#7d6608;">输入你的出生年份，看看你的属相和运势</p>
            <input type="number" id="birthYear" class="zodiac-input" placeholder="例如: 2004">
            <button class="main-btn" style="background:#f1c40f; box-shadow:0 8px 20px rgba(241, 196, 15, 0.3);" onclick="calculateZodiac()">开始测算</button>
            <div id="zodiacResult" style="margin-top:20px; line-height:1.6;"></div>
        </div>
    </div>
</div>

<script>
    // --- 逻辑切换 ---
    function switchTab(type, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(type + '-section').classList.add('active');
    }

    // --- 生肖查询 (你的 Python 逻辑转换版) ---
    function calculateZodiac() {
        const year = document.getElementById('birthYear').value;
        if (!year || year < 1900) { alert("请输入正确的年份"); return; }
        
        const animals = ["猴", "鸡", "狗", "猪", "鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊"];
        const zodiac = animals[year % 12];
        const resultEl = document.getElementById('zodiacResult');
        
        // 模拟 Python main.py 的逻辑输出
        resultEl.innerHTML = `
            <div style="font-size:1.2rem; font-weight:bold; color:#d35400;">你属 [${zodiac}]</div>
            <div style="font-size:0.85rem; color:#555; margin-top:10px;">
                💡 运势提示：${zodiac === '龙' ? '今年是你的本命年，万事小心！' : '今年运势平稳，适合在金宝探索更多美食。'}
            </div>
        `;
    }

    // --- 这里粘贴你之前完整的美食猎人 JS 代码 (init, startRolling, handleMainClick 等) ---
    // 为了节省篇幅，请把刚才给你的“微信感优化版”里的 <script> 内容填在下面
    // 注意：不要重复定义 init() 等已经存在的逻辑
</script>
</body>
</html>
